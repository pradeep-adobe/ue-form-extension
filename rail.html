<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Builder</title>
    <link rel="icon" type="image/png" href="./icons/online-form-icon.png" />
    <script type="module" src="/src/rail.js"></script>
  </head>
  <body>
    <main class="rail-shell">
      <div class="rail-brand">
        <img class="rail-brand-icon" src="./icons/online-form-icon.png" alt="" width="28" height="28" />
        <h1>Form Builder</h1>
      </div>
      <p class="rail-hint">
        Select a Form block on the page, then author here. The form renders
        live in the page preview (left). Switch selection to edit another form.
      </p>

      <p id="boundStatus" class="status">No Form block selected.</p>

      <section class="builder-section">
        <label class="form-label">Form title</label>
        <input id="formTitle" type="text" />
        <label class="form-label">Submit button label</label>
        <input id="submitLabel" type="text" />
      </section>

      <section class="builder-section">
        <div class="builder-head">
          <h2>Form Fields</h2>
          <button id="addField" type="button" class="btn-secondary">+ Add Form Field</button>
        </div>
        <div id="fields"></div>
      </section>

      <p id="syncStatus" class="status" hidden></p>
      <p id="railStatus" class="status">Connecting…</p>
    </main>
  </body>
</html>
